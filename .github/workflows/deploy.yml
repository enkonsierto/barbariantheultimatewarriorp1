name: Build & Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: pip install skoolkit==9.6 art

      - name: Construir HTML
        env:
          SKOOLKIT_HOME: ${{ github.workspace }}/../skoolkit-9.6
        run: |
          mkdir -p ../skoolkit-9.6/tools
          curl -sL https://github.com/skoolkid/skoolkit/archive/refs/tags/9.6.tar.gz \
            | tar -xz --strip-components=1 -C ../skoolkit-9.6
          make html HTML_OPTIONS="-toOa"

      - name: Listar build/html
        run: |
          echo "Contenido de build:"
          ls -R build || echo "NO EXISTE build"
          echo "Contenido de build/html:"
          ls -R build/html || echo "NO EXISTE build/html"

      - name: Publicar en gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/html
          publish_branch: gh-pages